name: wapor-downscale
channels:
  - pytorch
  - nvidia
  - conda-forge
dependencies:
  - python=3.12
  - pip
  - numpy>=1.26
  - scipy>=1.11
  - pandas>=2.0
  - rasterio>=1.3
  - pyproj>=3.6
  - shapely>=2.0
  - geopandas>=0.14
  - pyyaml>=6.0
  - matplotlib>=3.8
  - jupyter
  - ipykernel
  - pytorch>=2.3
  - torchvision>=0.18
  - pytorch-cuda=12.1   # change to match your CUDA driver
  - catboost>=1.2
  - scikit-learn>=1.3
  - joblib>=1.3
  - pip:
      - earthengine-api>=0.1.395
      - segmentation-models-pytorch>=0.3
      - timm>=1.0
      - einops>=0.7
      - huggingface-hub>=0.20
